services:
  qdrant:
    image: qdrant/qdrant:v1.15.4
    expose:
      - "6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      - FASTEMBED_CACHE_PATH=/app/.fastembed_cache
      - HF_ENDPOINT=https://hf-mirror.com
      - NO_PROXY=localhost,127.0.0.1,qdrant
    volumes:
      - ./backend/data:/app/data
      - backend_fastembed_cache:/app/.fastembed_cache
    expose:
      - "8000"
    depends_on:
      - qdrant
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_BASE=
    environment:
      - NEXT_PUBLIC_API_BASE=
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  qdrant_data:
  backend_fastembed_cache:
