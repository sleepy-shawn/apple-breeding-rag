services:
  qdrant:
    image: qdrant/qdrant:v1.15.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      - FASTEMBED_CACHE_PATH=/app/.fastembed_cache
      - HF_ENDPOINT=https://hf-mirror.com
      - NO_PROXY=localhost,127.0.0.1,qdrant
    volumes:
      - ./backend/data:/app/data
      - backend_fastembed_cache:/app/.fastembed_cache
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

  web:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  qdrant_data:
  backend_fastembed_cache:
