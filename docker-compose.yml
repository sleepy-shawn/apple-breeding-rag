services:
  qdrant:
    image: qdrant/qdrant:v1.15.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      - FASTEMBED_CACHE_PATH=/app/.fastembed_cache
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

  web:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  qdrant_data:
